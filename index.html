<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LOVA Points Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Cascadia+Mono&display=swap" rel="stylesheet">
    <style>
      /* --- NEW LINE OA PLUS COLOR SCHEME --- */
      body { background-color: #F4F5F7; color: #333333; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
      .container { background: #FFFFFF; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #EAEAEA; }
      
      h2 { text-align: center; margin-bottom: 30px; letter-spacing: 0.5px; color: #111111; }
      
      input { width: 100%; padding: 12px; margin-bottom: 20px; background: #FFFFFF; border: 1px solid #D9D9D9; color: #333333; font-family: 'Cascadia Mono', monospace; border-radius: 4px; box-sizing: border-box; transition: all 0.2s ease; }
      input:focus { outline: none; border-color: #00B900; box-shadow: 0 0 0 2px rgba(0, 185, 0, 0.1); }
      
      button { width: 100%; padding: 14px; background: #00B900; color: #FFFFFF; border: none; font-family: 'Sora', sans-serif; font-weight: 600; cursor: pointer; border-radius: 4px; transition: background 0.3s ease; }
      button:hover { background: #009900; }
      
      #points-form { display: none; }
      
      .status { text-align: center; margin-top: 15px; font-size: 0.9em; font-family: 'Cascadia Mono', monospace; color: #00B900; }
      .user-info { text-align: center; margin-bottom: 20px; font-size: 0.85em; color: #888888; }
    </style>
  </head>
  <body>
    <div class="container">
      
      <!-- Login Screen -->
      <div id="login-section">
        <h2>PORTAL ACCESS</h2>
        <input type="password" id="passcode" placeholder="Enter 6-Digit Code">
        <button onclick="login()">UNLOCK</button>
        <div id="login-status" class="status" style="color: #F44336;"></div>
      </div>

      <!-- Point Intake Form -->
      <div id="points-form">
        <h2>ADD POINTS</h2>
        <div id="active-user" class="user-info"></div>
        <input type="text" id="phone" placeholder="Customer Phone (10 Digits)">
        <input type="text" id="billing" placeholder="Billing ID (Order #)">
        <input type="number" id="amount" placeholder="Money Amount (THB)">
        <button onclick="submitData()">SUBMIT TO CRM</button>
        <div id="submit-status" class="status"></div>
      </div>

    </div>

    <script>
      // Your active deployment URL (Do not change)
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '';

      // The core communication bridge
      async function sendToAPI(payload) {
        try {
          const response = await fetch(API_URL, {
            redirect: "follow",
            method: 'POST',
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify(payload)
          });
          return await response.json();
        } catch (error) {
          return { success: false, message: "Network error. Check your connection." };
        }
      }

      // Login Logic
      async function login() {
        const code = document.getElementById('passcode').value;
        if (!code) return;
        
        document.getElementById('login-status').innerText = 'Verifying with Database...';
        document.getElementById('login-status').style.color = '#888888'; // Neutral text while loading
        
        const response = await sendToAPI({ action: 'login', passcode: code });
        
        if (response.success) {
          currentPasscode = code;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('points-form').style.display = 'block';
          document.getElementById('active-user').innerText = `Active Session: ${response.name} | ${response.branch}`;
        } else {
          document.getElementById('login-status').innerText = response.message;
          document.getElementById('login-status').style.color = '#F44336'; // Red for error
        }
      }

      // Submit Points Logic
      async function submitData() {
        const phone = document.getElementById('phone').value;
        const billing = document.getElementById('billing').value;
        const amount = document.getElementById('amount').value;
        const statusBox = document.getElementById('submit-status');
        
        // Basic frontend validation
        if (!phone || !billing || !amount) {
           statusBox.innerText = 'Please fill all three fields.';
           statusBox.style.color = '#F44336';
           return;
        }

        statusBox.innerText = 'Pushing data to secure server...';
        statusBox.style.color = '#00B900'; // LINE Green for success state
        
        const response = await sendToAPI({
          action: 'submit',
          passcode: currentPasscode,
          phone: phone,
          billingId: billing,
          amount: amount
        });

        statusBox.innerText = response.message;
        
        if(response.success) {
          // Clear fields for the next customer order
          document.getElementById('phone').value = '';
          document.getElementById('billing').value = '';
          document.getElementById('amount').value = '';
          
          // Clear success message after 3 seconds
          setTimeout(() => { statusBox.innerText = ''; }, 3000);
        } else {
          statusBox.style.color = '#F44336'; // Red for error
        }
      }
    </script>
  </body>
</html>
