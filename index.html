<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVA Points Portal</title>
    <!-- Professional Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <!-- SheetJS Library for Professional .xlsx Export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
      body { background-color: #F9FAFB; color: #1F2937; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .container { background: #FFFFFF; padding: 48px 32px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 12px 40px rgba(0,0,0,0.04); border: 1px solid #F3F4F6; }

      .header-area { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 6px; }
      h2 { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #111827; text-align: center; }
      
      .refresh-btn { position: absolute; right: -10px; background: none; border: none; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: center; }
      .refresh-icon { fill: #9CA3AF; width: 18px; height: 18px; transition: transform 0.4s ease, fill 0.2s; }
      .refresh-btn:hover .refresh-icon { fill: #00B900; transform: rotate(180deg); }
      .refresh-icon.spinning { animation: spin 0.8s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      .user-meta { text-align: center; margin-bottom: 32px; font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1.2px; }

      input, .btn-primary, .btn-secondary { width: 100%; height: 56px; border-radius: 14px; font-size: 16px; font-weight: 600; display: flex; justify-content: center; align-items: center; text-align: center; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none; outline: none; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
      input { background: #FDFDFD; border: 1.5px solid #F3F4F6; color: #111827; }
      input:focus { border-color: #00B900; box-shadow: 0 0 0 4px rgba(0, 185, 0, 0.08); background: #FFF; }
      #passcode { letter-spacing: 0.9em; padding-left: 0.9em; font-weight: 700; }

      .btn-primary { background: #00B900; color: #FFFFFF; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 12px rgba(0, 185, 0, 0.15); }
      .btn-primary:hover { background: #009900; transform: translateY(-1px); }
      .btn-secondary { background: #F3F4F6; color: #4B5563; cursor: pointer; margin-bottom: 12px; }

      #admin-dashboard, #points-form { display: none; }
      .branch-card { background: #FFFFFF; border: 1px solid #F3F4F6; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
      .branch-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 4px; }
      .branch-data { font-size: 12px; font-weight: 500; color: #6B7280; margin-bottom: 12px; }
      .btn-export { width: 100%; height: 42px; background: #374151; color: white; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
      
      .status-text { text-align: center; margin-top: 16px; font-size: 13px; font-weight: 600; color: #00B900; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      <section id="login-section">
        <div class="header-area"><h2>Portal Access</h2></div>
        <p class="user-meta">Internal Secure Access</p>
        <input type="password" id="passcode" placeholder="••••••" inputmode="numeric" maxlength="6">
        <button class="btn-primary" onclick="login()">UNLOCK SYSTEM</button>
        <div id="login-status" class="status-text" style="color: #EF4444;"></div>
      </section>

      <section id="admin-dashboard">
        <div class="header-area">
          <h2>Master Dashboard</h2>
          <button class="refresh-btn" onclick="loadAdminData()">
            <svg class="refresh-icon" id="refresh-svg" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          </button>
        </div>
        <p class="user-meta" id="admin-meta"></p>
        <div id="branch-list"></div>
        <button class="btn-secondary" style="margin-top: 16px;" onclick="toggleView()">ADD POINTS MANUALLY</button>
        <button class="btn-secondary" style="background:none; border:1.5px solid #F3F4F6;" onclick="location.reload()">LOGOUT</button>
      </section>

      <section id="points-form">
        <div class="header-area"><h2>Add Points</h2></div>
        <p class="user-meta" id="active-user-meta"></p>
        <input type="tel" id="phone" placeholder="000-000-0000" maxlength="12">
        <input type="text" id="billing" placeholder="Order ID / Billing ID">
        <input type="text" id="amount" placeholder="Amount (THB)" inputmode="numeric">
        <button class="btn-primary" onclick="submitData()">CONFIRM TRANSACTION</button>
        <button id="back-btn" class="btn-secondary" style="display:none;" onclick="toggleView()">BACK TO DASHBOARD</button>
        <div id="submit-status" class="status-text"></div>
      </section>
    </div>

    <script>
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '';
      let userRole = '';

      document.getElementById('phone').addEventListener('input', e => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
      });

      document.getElementById('amount').addEventListener('input', e => {
        let val = e.target.value.replace(/\D/g, '');
        e.target.value = val ? Number(val).toLocaleString() : "";
      });

      async function api(p) {
        const r = await fetch(API_URL, {method:'POST', body: JSON.stringify(p)});
        return r.json();
      }

      async function login() {
        const code = document.getElementById('passcode').value;
        const res = await api({ action: 'login', passcode: code });
        if (res.success) {
          currentPasscode = code; userRole = res.role;
          document.getElementById('login-section').style.display = 'none';
          if (res.role === 'Admin') showAdmin(res.name); else showIntake(res.name, res.branch);
        } else { document.getElementById('login-status').innerText = res.message; }
      }

      function showAdmin(n) { document.getElementById('admin-dashboard').style.display = 'block'; document.getElementById('points-form').style.display = 'none'; document.getElementById('admin-meta').innerText = `${n} • Master Dashboard`; loadAdminData(); }
      function showIntake(n, b) { document.getElementById('points-form').style.display = 'block'; document.getElementById('admin-dashboard').style.display = 'none'; document.getElementById('active-user-meta').innerText = `${n} • ${b}`; if (userRole === 'Admin') document.getElementById('back-btn').style.display = 'flex'; }
      function toggleView() { if (document.getElementById('admin-dashboard').style.display === 'block') showIntake("Admin Mode", "HQ"); else showAdmin("Admin Mode"); }

      async function loadAdminData() {
        const icon = document.getElementById('refresh-svg'); icon.classList.add('spinning');
        const res = await api({ action: 'getAdminData' }); icon.classList.remove('spinning');
        const list = document.getElementById('branch-list'); list.innerHTML = "";
        if (!res.summary || Object.keys(res.summary).length === 0) { list.innerHTML = "<div style='text-align:center; padding:40px; color:#D1D5DB; font-size:13px;'>No pending orders.</div>"; return; }
        for (let b in res.summary) {
          const s = res.summary[b];
          list.innerHTML += `<div class="branch-card"><div class="branch-title">${b}</div><div class="branch-data">${s.count} Orders • ฿${s.total.toLocaleString()}</div><button class="btn-export" onclick="downloadExcel('${b}')">GENERATE EXCEL</button></div>`;
        }
      }

      async function downloadExcel(branch) {
        const res = await api({ action: 'exportBranch', branchName: branch });
        if (res.success) {
          const headers = ["Phone Number", "Billing ID", "Money Amount"];
          const data = [headers, ...res.csvData];
          const ws = XLSX.utils.aoa_to_sheet(data);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Points");
          XLSX.writeFile(wb, `${branch}_Upload.xlsx`);
          setTimeout(loadAdminData, 1000);
        }
      }

      async function submitData() {
        const p = document.getElementById('phone').value.replace(/\D/g, '');
        const b = document.getElementById('billing').value;
        const a = document.getElementById('amount').value.replace(/\D/g, '');
        const status = document.getElementById('submit-status');
        if (p.length !== 10) { status.innerText = 'Invalid Phone'; status.style.color = '#EF4444'; return; }
        status.innerText = 'Syncing...'; status.style.color = '#00B900';
        const res = await api({ action:'submit', passcode:currentPasscode, phone:p, billingId:b, amount:a });
        status.innerText = res.message;
        if(res.success) { document.getElementById('phone').value = ''; document.getElementById('billing').value = ''; document.getElementById('amount').value = ''; setTimeout(() => status.innerText = '', 3000); }
      }
    </script>
  </body>
</html>
