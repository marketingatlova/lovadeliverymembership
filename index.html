<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVA Points Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      body { background-color: #F8F9FA; color: #2D3436; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
      
      .container { background: #FFFFFF; padding: 45px 30px; border-radius: 20px; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #E9ECEF; position: relative; }
      
      /* Header & Refresh Icon Vector */
      .header-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; }
      h2 { margin: 0; letter-spacing: 1.5px; color: #111111; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; }
      
      .refresh-vector { cursor: pointer; width: 20px; height: 20px; fill: #adb5bd; transition: all 0.3s ease; }
      .refresh-vector:hover { fill: #00B900; transform: rotate(180deg); }
      .refresh-vector.loading { animation: spin 1s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      .user-info { text-align: center; margin-bottom: 30px; font-size: 11px; color: #adb5bd; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

      /* Uniform Entry & Button Geometry */
      input, .action-btn, .secondary-btn { 
        width: 100%; 
        height: 56px; 
        border-radius: 12px; 
        font-family: 'Inter', sans-serif; 
        font-size: 16px; 
        font-weight: 600; 
        transition: all 0.2s ease; 
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        border: none;
        appearance: none;
      }

      input { background: #FFFFFF; border: 1.5px solid #E9ECEF; color: #1A1A1A; text-align: center; }
      input:focus { outline: none; border-color: #00B900; box-shadow: 0 0 0 4px rgba(0, 185, 0, 0.08); }
      #passcode { letter-spacing: 0.9em; padding-left: 1.4em; }

      .action-btn { background: #00B900; color: #FFFFFF; cursor: pointer; margin-top: 10px; }
      .action-btn:hover { background: #009900; }
      
      .secondary-btn { background: #F1F3F5; color: #495057; cursor: pointer; margin-top: 0; margin-bottom: 12px; }
      .secondary-btn:hover { background: #E9ECEF; }

      #points-form, #admin-dashboard { display: none; }

      /* Admin Card Styling */
      .admin-card { background: #FFFFFF; padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #F1F3F5; display: flex; flex-direction: column; gap: 4px; }
      .branch-name { font-weight: 700; font-size: 15px; color: #1A1A1A; }
      .branch-stats { font-size: 13px; color: #868E96; font-weight: 500; margin-bottom: 12px; }
      .export-btn { height: 44px; font-size: 13px; background: #343A40; color: white; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
      
      .status { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 600; color: #00B900; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      
      <!-- Login Section -->
      <div id="login-section">
        <div class="header-wrapper"><h2>Portal Access</h2></div>
        <div class="user-info">Internal Authentication</div>
        <input type="password" id="passcode" placeholder="••••••" inputmode="numeric" maxlength="6">
        <button class="action-btn" onclick="login()">UNLOCK SYSTEM</button>
        <div id="login-status" class="status" style="color: #E63946;"></div>
      </div>

      <!-- Admin Dashboard -->
      <div id="admin-dashboard">
        <div class="header-wrapper">
          <h2>Master Dashboard</h2>
          <!-- Refresh Vector Icon -->
          <svg class="refresh-vector" id="refresh-icon" onclick="loadAdminData()" viewBox="0 0 24 24">
            <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </div>
        <div class="user-info" id="admin-info"></div>
        <div id="branch-list"></div>
        <button class="secondary-btn" style="margin-top:20px;" onclick="toggleView()">ADD POINTS MANUALLY</button>
        <button class="secondary-btn" style="background:transparent; border:1px solid #DEE2E6;" onclick="location.reload()">LOGOUT</button>
      </div>

      <!-- Point Intake Form -->
      <div id="points-form">
        <div class="header-wrapper"><h2 id="form-title">Add Points</h2></div>
        <div id="active-user" class="user-info"></div>
        <input type="tel" id="phone" placeholder="000-000-0000" maxlength="12">
        <input type="text" id="billing" placeholder="Order ID / Billing ID">
        <input type="text" id="amount" placeholder="Amount (THB)" inputmode="numeric">
        <button class="action-btn" onclick="submitData()">CONFIRM TRANSACTION</button>
        <button id="back-to-admin" class="secondary-btn" style="display:none;" onclick="toggleView()">BACK TO DASHBOARD</button>
        <div id="submit-status" class="status"></div>
      </div>

    </div>

    <script>
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '';
      let userRole = '';

      document.getElementById('phone').addEventListener('input', e => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
      });

      document.getElementById('amount').addEventListener('input', e => {
        let val = e.target.value.replace(/\D/g, '');
        e.target.value = val ? Number(val).toLocaleString() : "";
      });

      async function api(p) {
        const r = await fetch(API_URL, {method:'POST', body: JSON.stringify(p)});
        return r.json();
      }

      async function login() {
        const code = document.getElementById('passcode').value;
        const res = await api({ action: 'login', passcode: code });
        if (res.success) {
          currentPasscode = code;
          userRole = res.role;
          document.getElementById('login-section').style.display = 'none';
          if (res.role === 'Admin') showAdmin(res.name);
          else showIntake(res.name, res.branch);
        } else document.getElementById('login-status').innerText = res.message;
      }

      function showAdmin(name) {
        document.getElementById('admin-dashboard').style.display = 'block';
        document.getElementById('points-form').style.display = 'none';
        document.getElementById('admin-info').innerText = `${name} • HQ MASTER`;
        loadAdminData();
      }

      function showIntake(name, branch) {
        document.getElementById('points-form').style.display = 'block';
        document.getElementById('admin-dashboard').style.display = 'none';
        document.getElementById('active-user').innerText = `${name} • ${branch}`;
        if (userRole === 'Admin') document.getElementById('back-to-admin').style.display = 'block';
      }

      function toggleView() {
        if (document.getElementById('admin-dashboard').style.display === 'block') showIntake("Admin Mode", "HQ");
        else showAdmin("Admin Mode");
      }

      async function loadAdminData() {
        const icon = document.getElementById('refresh-icon');
        const list = document.getElementById('branch-list');
        icon.classList.add('loading');
        
        const res = await api({ action: 'getAdminData' });
        icon.classList.remove('loading');
        list.innerHTML = "";
        
        if (Object.keys(res.summary).length === 0) {
          list.innerHTML = "<div style='text-align:center; padding:30px; color:#adb5bd; font-size:13px;'>All orders exported.</div>";
          return;
        }

        for (let b in res.summary) {
          const s = res.summary[b];
          list.innerHTML += `
            <div class="admin-card">
              <div class="branch-name">${b}</div>
              <div class="branch-stats">${s.count} Orders • ฿${s.total.toLocaleString()}</div>
              <button class="export-btn" onclick="downloadCSV('${b}')">GENERATE CSV</button>
            </div>`;
        }
      }

      async function downloadCSV(branch) {
        const res = await api({ action: 'exportBranch', branchName: branch });
        if (res.success) {
          let csv = "Phone Number,Billing ID,Money Amount\n" + res.csvData.map(r => r.join(",")).join("\n");
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `${branch}_Points.csv`;
          a.click(); 
          setTimeout(loadAdminData, 1000);
        }
      }

      async function submitData() {
        const p = document.getElementById('phone').value.replace(/\D/g, '');
        const b = document.getElementById('billing').value;
        const a = document.getElementById('amount').value.replace(/\D/g, '');
        const res = await api({ action:'submit', passcode:currentPasscode, phone:p, billingId:b, amount:a });
        document.getElementById('submit-status').innerText = res.message;
        if(res.success) {
           document.getElementById('phone').value = ''; document.getElementById('billing').value = ''; document.getElementById('amount').value = '';
           setTimeout(() => document.getElementById('submit-status').innerText = '', 3000);
        }
      }
    </script>
  </body>
</html>
