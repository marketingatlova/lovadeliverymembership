<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVA Points Portal</title>
    <!-- Importing Inter for business-like legibility and Montserrat for branding -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      
      body { background-color: #F8F9FA; color: #2D3436; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
      
      .container { background: #FFFFFF; padding: 40px 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #E9ECEF; }
      
      #login-section { display: flex; flex-direction: column; align-items: center; }
      
      h2 { text-align: center; margin-bottom: 25px; letter-spacing: 1px; color: #1A1A1A; font-family: 'Montserrat', sans-serif; font-size: 20px; text-transform: uppercase; }
      
      /* Business-like inputs: Inter font, centered, with no auto-zoom on iOS */
      input { width: 100%; padding: 16px; margin-bottom: 16px; background: #FFFFFF; border: 1px solid #CED4DA; color: #1A1A1A; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; border-radius: 8px; transition: all 0.2s ease; appearance: none; text-align: center; }
      
      input:focus { outline: none; border-color: #00B900; box-shadow: 0 0 0 3px rgba(0, 185, 0, 0.1); }
      
      /* PINCODE FIX: Wide letter spacing so dots do not touch */
      #passcode { letter-spacing: 0.8em; padding-left: 1.2em; /* Offsets the spacing so dots stay centered */ }
      
      button { width: 100%; padding: 16px; background: #00B900; color: #FFFFFF; border: none; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; border-radius: 8px; transition: background 0.3s ease; appearance: none; margin-top: 10px; letter-spacing: 0.5px; }
      
      button:hover { background: #009900; }
      
      #points-form { display: none; }
      .status { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 500; color: #00B900; min-height: 20px; }
      .user-info { text-align: center; margin-bottom: 25px; font-size: 13px; color: #6C757D; font-weight: 400; }
    </style>
  </head>
  <body>
    <div class="container">
      
      <div id="login-section">
        <h2>Portal Access</h2>
        <input type="password" id="passcode" placeholder="••••••" inputmode="numeric" maxlength="6">
        <button onclick="login()">UNLOCK SYSTEM</button>
        <div id="login-status" class="status" style="color: #D63031;"></div>
      </div>

      <div id="points-form">
        <h2>Add Points</h2>
        <div id="active-user" class="user-info"></div>
        
        <input type="tel" id="phone" placeholder="000-000-0000" maxlength="12">
        <input type="text" id="billing" placeholder="Grab / Order ID">
        <input type="text" id="amount" placeholder="Amount (THB)" inputmode="numeric">
        
        <button onclick="submitData()">CONFIRM TRANSACTION</button>
        <div id="submit-status" class="status"></div>
      </div>

    </div>

    <script>
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '';

      document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
      });

      document.getElementById('amount').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value === "") { e.target.value = ""; return; }
        e.target.value = Number(value).toLocaleString();
      });

      async function sendToAPI(payload) {
        try {
          const response = await fetch(API_URL, {
            redirect: "follow",
            method: 'POST',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          return await response.json();
        } catch (error) {
          return { success: false, message: "Connection lost. Retry." };
        }
      }

      async function login() {
        const code = document.getElementById('passcode').value;
        if (!code) return;
        document.getElementById('login-status').innerText = 'Authenticating...';
        const response = await sendToAPI({ action: 'login', passcode: code });
        if (response.success) {
          currentPasscode = code;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('points-form').style.display = 'block';
          document.getElementById('active-user').innerText = `${response.name} | ${response.branch}`;
        } else {
          document.getElementById('login-status').innerText = response.message;
        }
      }

      async function submitData() {
        const phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
        const billing = document.getElementById('billing').value;
        const amountRaw = document.getElementById('amount').value.replace(/\D/g, '');
        const statusBox = document.getElementById('submit-status');
        
        if (phoneRaw.length !== 10) {
           statusBox.innerText = 'Invalid Phone Number';
           statusBox.style.color = '#D63031';
           return;
        }

        statusBox.innerText = 'Processing...';
        statusBox.style.color = '#00B900'; 
        
        const response = await sendToAPI({
          action: 'submit',
          passcode: currentPasscode,
          phone: phoneRaw,
          billingId: billing,
          amount: amountRaw
        });

        statusBox.innerText = response.message;
        if(response.success) {
          document.getElementById('phone').value = '';
          document.getElementById('billing').value = '';
          document.getElementById('amount').value = '';
          setTimeout(() => { statusBox.innerText = ''; }, 3000);
        }
      }
    </script>
  </body>
</html>
