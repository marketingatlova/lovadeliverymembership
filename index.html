<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVA Points Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      
      body { background-color: #F8F9FA; color: #2D3436; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
      
      .container { background: #FFFFFF; padding: 45px 30px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #E9ECEF; }
      
      #login-section { display: flex; flex-direction: column; align-items: center; }
      
      /* Header: Bold Montserrat for a premium "One Bangkok" feel */
      h2 { text-align: center; margin-bottom: 8px; letter-spacing: 1.5px; color: #111111; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; }
      
      /* Hierarchy: Metadata is secondary, smaller, and lighter weight */
      .user-info { text-align: center; margin-bottom: 30px; font-size: 12px; color: #adb5bd; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

      /* Inputs: Using Inter Medium for a professional, firm look */
      input { width: 100%; padding: 16px; margin-bottom: 18px; background: #FFFFFF; border: 1.5px solid #E9ECEF; color: #1A1A1A; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; border-radius: 10px; transition: all 0.2s ease; appearance: none; text-align: center; }
      
      input::placeholder { color: #CED4DA; font-weight: 400; }
      input:focus { outline: none; border-color: #00B900; box-shadow: 0 0 0 4px rgba(0, 185, 0, 0.08); }
      
      /* PINCODE: Bold dots with wide spacing */
      #passcode { letter-spacing: 0.9em; padding-left: 1.4em; font-weight: 600; }
      
      /* Button: Bold Semi-Bold weight for clear action hierarchy */
      button { width: 100%; padding: 18px; background: #00B900; color: #FFFFFF; border: none; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; border-radius: 10px; transition: all 0.3s ease; appearance: none; margin-top: 10px; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(0, 185, 0, 0.2); }
      
      button:hover { background: #009900; transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      
      #points-form { display: none; }
      .status { text-align: center; margin-top: 20px; font-size: 13px; font-weight: 600; color: #00B900; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      
      <div id="login-section">
        <h2>System Access</h2>
        <div class="user-info">Secure Internal Portal</div>
        <input type="password" id="passcode" placeholder="••••••" inputmode="numeric" maxlength="6">
        <button onclick="login()">UNLOCK SYSTEM</button>
        <div id="login-status" class="status" style="color: #E63946;"></div>
      </div>

      <div id="points-form">
        <h2>Add Points</h2>
        <div id="active-user" class="user-info"></div>
        
        <input type="tel" id="phone" placeholder="000-000-0000" maxlength="12">
        <input type="text" id="billing" placeholder="Order ID / Billing ID">
        <input type="text" id="amount" placeholder="Amount (THB)" inputmode="numeric">
        
        <button onclick="submitData()">CONFIRM TRANSACTION</button>
        <div id="submit-status" class="status"></div>
      </div>

    </div>

    <script>
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '';

      document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
      });

      document.getElementById('amount').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value === "") { e.target.value = ""; return; }
        e.target.value = Number(value).toLocaleString();
      });

      async function sendToAPI(payload) {
        try {
          const response = await fetch(API_URL, {
            redirect: "follow",
            method: 'POST',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          return await response.json();
        } catch (error) {
          return { success: false, message: "Server connection failed." };
        }
      }

      async function login() {
        const code = document.getElementById('passcode').value;
        if (!code) return;
        document.getElementById('login-status').innerText = 'Verifying...';
        const response = await sendToAPI({ action: 'login', passcode: code });
        if (response.success) {
          currentPasscode = code;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('points-form').style.display = 'block';
          document.getElementById('active-user').innerText = `${response.name} • ${response.branch}`;
        } else {
          document.getElementById('login-status').innerText = response.message;
        }
      }

      async function submitData() {
        const phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
        const billing = document.getElementById('billing').value;
        const amountRaw = document.getElementById('amount').value.replace(/\D/g, '');
        const statusBox = document.getElementById('submit-status');
        
        if (phoneRaw.length !== 10) {
           statusBox.innerText = 'Invalid Phone Number Format';
           statusBox.style.color = '#E63946';
           return;
        }

        statusBox.innerText = 'Transmitting...';
        statusBox.style.color = '#00B900'; 
        
        const response = await sendToAPI({
          action: 'submit',
          passcode: currentPasscode,
          phone: phoneRaw,
          billingId: billing,
          amount: amountRaw
        });

        statusBox.innerText = response.message;
        if(response.success) {
          document.getElementById('phone').value = '';
          document.getElementById('billing').value = '';
          document.getElementById('amount').value = '';
          setTimeout(() => { statusBox.innerText = ''; }, 3000);
        }
      }
    </script>
  </body>
</html>
