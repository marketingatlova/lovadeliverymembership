<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVA Points Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
      body { background-color: #F9FAFB; color: #111827; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      
      .container { background: #FFFFFF; padding: 48px 32px; border-radius: 24px; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #F3F4F6; }

      .header-area { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 8px; }
      h2 { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; color: #111827; }
      
      .refresh-btn { position: absolute; right: -10px; background: none; border: none; cursor: pointer; padding: 10px; display: flex; }
      .refresh-icon { fill: #9CA3AF; width: 18px; height: 18px; transition: transform 0.4s; }
      .refresh-icon.spinning { animation: spin 0.8s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      .user-meta { text-align: center; margin-bottom: 32px; font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1.2px; }

      /* Expert Component Geometry: 56px Height */
      input, select, .btn-primary, .btn-secondary { width: 100%; height: 56px; border-radius: 14px; font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; text-align: center; text-align-last: center; transition: all 0.2s; border: 1.5px solid #F3F4F6; outline: none; margin-bottom: 16px; background: #FFF; appearance: none; }
      
      input:focus, select:focus { border-color: #00B900; box-shadow: 0 0 0 4px rgba(0, 185, 0, 0.08); }
      #passcode { letter-spacing: 0.9em; padding-left: 0.9em; font-weight: 700; }

      .btn-primary { background: #00B900; color: #FFF; cursor: pointer; border: none; margin-top: 8px; }
      .btn-primary:hover { background: #009900; transform: translateY(-1px); }
      .btn-secondary { background: #F3F4F6; color: #4B5563; cursor: pointer; border: none; }

      /* Session History Section */
      .history-section { margin-top: 32px; border-top: 1px solid #F3F4F6; padding-top: 24px; }
      .history-title { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; text-align: center; }
      .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F9FAFB; font-size: 13px; color: #4B5563; }
      .history-item span:last-child { font-weight: 700; color: #111827; }

      #admin-dashboard, #points-form, #admin-branch-wrap { display: none; }
      .branch-card { background: #F9FAFB; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #F3F4F6; }
      .branch-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
      .branch-data { font-size: 12px; color: #6B7280; margin-bottom: 12px; }
      .btn-export { width: 100%; height: 42px; background: #374151; color: #FFF; border-radius: 10px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
      
      .status-text { text-align: center; margin-top: 16px; font-size: 13px; font-weight: 600; color: #00B900; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      <section id="login-section">
        <div class="header-area"><h2>Portal Access</h2></div>
        <p class="user-meta">Internal Secure Access</p>
        <input type="password" id="passcode" placeholder="••••••" inputmode="numeric" maxlength="6">
        <button class="btn-primary" onclick="login()">UNLOCK SYSTEM</button>
        <div id="login-status" class="status-text" style="color: #EF4444;"></div>
      </section>

      <section id="admin-dashboard">
        <div class="header-area">
          <h2>Master Dashboard</h2>
          <button class="refresh-btn" onclick="loadAdminData()"><svg class="refresh-icon" id="refresh-svg" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
        </div>
        <p class="user-meta" id="admin-meta"></p>
        <div id="branch-list"></div>
        <button class="btn-secondary" style="margin-top: 16px;" onclick="toggleView()">ADD POINTS MANUALLY</button>
        <button class="btn-secondary" style="background:none; border:1.5px solid #F3F4F6;" onclick="location.reload()">LOGOUT</button>
      </section>

      <section id="points-form">
        <div class="header-area"><h2>Add Points</h2></div>
        <p class="user-meta" id="active-user-meta"></p>
        
        <div id="admin-branch-wrap">
          <select id="branch-override"><option value="">-- SELECT BRANCH --</option></select>
        </div>

        <input type="tel" id="phone" placeholder="000-000-0000" maxlength="12">
        <input type="text" id="billing" placeholder="Order ID / Billing ID">
        <input type="text" id="amount" placeholder="Amount (THB)" inputmode="numeric">
        <button class="btn-primary" onclick="submitData()">CONFIRM TRANSACTION</button>
        <button id="back-btn" class="btn-secondary" style="display:none;" onclick="toggleView()">BACK TO DASHBOARD</button>
        <div id="submit-status" class="status-text"></div>

        <div class="history-section" id="session-history-wrap" style="display:none;">
          <p class="history-title">Session History</p>
          <div id="history-list"></div>
        </div>
      </section>
    </div>

    <script>
      const API_URL = 'https://script.google.com/macros/s/AKfycbxc9ooiKrfd3rixvbAtZhRB6GKmrVswBNnHB47T0I_amruA_0DNkYc-DYB_NN5-LBEkXA/exec';
      let currentPasscode = '', userRole = '', history = [];

      document.getElementById('phone').addEventListener('input', e => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
      });

      document.getElementById('amount').addEventListener('input', e => {
        let val = e.target.value.replace(/\D/g, '');
        e.target.value = val ? Number(val).toLocaleString() : "";
      });

      async function api(p) { return (await fetch(API_URL, {method:'POST', body: JSON.stringify(p)})).json(); }

      async function login() {
        const code = document.getElementById('passcode').value;
        const res = await api({ action: 'login', passcode: code });
        if (res.success) {
          currentPasscode = code; userRole = res.role;
          document.getElementById('login-section').style.display = 'none';
          if (res.role === 'Admin') {
            const bRes = await api({ action: 'getBranches' });
            const sel = document.getElementById('branch-override');
            bRes.branches.forEach(b => sel.innerHTML += `<option value="${b}">${b}</option>`);
            showAdmin(res.name);
          } else showIntake(res.name, res.branch);
        } else document.getElementById('login-status').innerText = res.message;
      }

      function showAdmin(n) { document.getElementById('admin-dashboard').style.display = 'block'; document.getElementById('points-form').style.display = 'none'; document.getElementById('admin-meta').innerText = `${n} • Master Dashboard`; loadAdminData(); }
      function showIntake(n, b) { 
        document.getElementById('points-form').style.display = 'block'; 
        document.getElementById('admin-dashboard').style.display = 'none'; 
        document.getElementById('active-user-meta').innerText = `${n} • ${b}`; 
        if (userRole === 'Admin') {
          document.getElementById('back-btn').style.display = 'flex';
          document.getElementById('admin-branch-wrap').style.display = 'block';
        }
      }

      function toggleView() { if (document.getElementById('admin-dashboard').style.display === 'block') showIntake("Admin Session", "HQ"); else showAdmin("Admin Session"); }

      async function loadAdminData() {
        const icon = document.getElementById('refresh-svg'); icon.classList.add('spinning');
        const res = await api({ action: 'getAdminData' }); icon.classList.remove('spinning');
        const list = document.getElementById('branch-list'); list.innerHTML = "";
        if (!res.summary || Object.keys(res.summary).length === 0) { list.innerHTML = "<p style='text-align:center; padding:40px; color:#D1D5DB; font-size:13px;'>No pending orders.</p>"; return; }
        for (let b in res.summary) {
          const s = res.summary[b];
          list.innerHTML += `<div class="branch-card"><div class="branch-title">${b}</div><div class="branch-data">${s.count} Orders • ฿${s.total.toLocaleString()}</div><button class="btn-export" onclick="downloadExcel('${b}')">GENERATE EXCEL</button></div>`;
        }
      }

      async function downloadExcel(branch) {
        const res = await api({ action: 'exportBranch', branchName: branch });
        if (res.success) {
          const data = [["Phone Number", "Billing ID", "Money Amount"], ...res.csvData];
          const ws = XLSX.utils.aoa_to_sheet(data), wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Points");
          XLSX.writeFile(wb, `${branch}_Upload.xlsx`);
          setTimeout(loadAdminData, 1000);
        }
      }

      async function submitData() {
        const p = document.getElementById('phone').value.replace(/\D/g, ''), b = document.getElementById('billing').value, a = document.getElementById('amount').value.replace(/\D/g, ''), ov = document.getElementById('branch-override').value;
        const status = document.getElementById('submit-status');
        
        if (userRole === 'Admin' && !ov) { status.innerText = 'Select a Branch'; status.style.color = '#EF4444'; return; }
        if (p.length !== 10) { status.innerText = 'Invalid Phone'; status.style.color = '#EF4444'; return; }

        status.innerText = 'Syncing...'; status.style.color = '#00B900';
        const res = await api({ action:'submit', passcode:currentPasscode, phone:p, billingId:b, amount:a, branchOverride: ov });
        
        if(res.success) {
          history.unshift({ phone: p, amount: a, branch: res.branch });
          updateHistory();
          document.getElementById('phone').value = ''; document.getElementById('billing').value = ''; document.getElementById('amount').value = '';
          status.innerText = "Transaction Synced!";
          setTimeout(() => status.innerText = '', 3000);
        }
      }

      function updateHistory() {
        const wrap = document.getElementById('session-history-wrap'), list = document.getElementById('history-list');
        wrap.style.display = 'block';
        list.innerHTML = history.slice(0, 5).map(h => `<div class="history-item"><span>${h.phone} (${h.branch})</span><span>฿${Number(h.amount).toLocaleString()}</span></div>`).join('');
      }
    </script>
  </body>
</html>
